<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Pages</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#020617;
  --card:#111827;
  --accent:#6366f1;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  min-height:100vh;
}

header{
  text-align:center;
  padding:50px 20px 30px;
}

header h1{
  font-size:2.2rem;
}

.container{
  width:min(1100px,92%);
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
  padding-bottom:40px;
}

.card{
  display:flex;
  align-items:center;
  gap:16px;
  text-decoration:none;
  color:var(--text);
  background:var(--card);
  border-radius:16px;
  padding:18px;
  border:1px solid rgba(255,255,255,0.05);
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.info{
  display:flex;
  flex-direction:column;
}

.title{
  font-weight:600;
}

.path{
  font-size:.8rem;
  color:var(--muted);
}

footer{
  text-align:center;
  padding:20px;
  color:var(--muted);
  font-size:.85rem;
}
</style>
</head>
<body>

<header>
<h1>My Projects</h1>
</header>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<footer>
</footer>

<script>
/*
ADD PAGES HERE
logo can be:
- local image
- online image
- svg
*/

const pages = [
  {
    name: "🧲 Magnetic maze generator",
    file: "magnetic_maze_designer.html",
  },
  {
    name: "🚁 Operator ID labels for your drones",
    file: "drone-label-generator.html",
  },
];

const grid = document.getElementById("grid");

pages.forEach(p=>{
  const card = document.createElement("a");
  card.href = p.file;
  card.className = "card";

  card.innerHTML = `
    <div class="info">
      <div class="title">${p.name}</div>     
    </div>
  `;

  grid.appendChild(card);
});
</script>

</body>
</html>
